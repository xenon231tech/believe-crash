<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Believe Crash</title>

<!-- PREMIUM FONT -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#070b14;
  color:white;
  font-family:'Inter', sans-serif;
  overflow:hidden;
}

/* =========================
   MAIN LAYOUT
========================= */

.container{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* =========================
   TOPBAR
========================= */

.topbar{
  height:80px;
  background:rgba(10,15,25,0.96);
  border-bottom:1px solid rgba(255,255,255,0.05);

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 24px;
}

/* GAME LOGO */

.logo{
  font-family:'Orbitron', sans-serif;
  font-size:32px;
  font-weight:900;
  letter-spacing:3px;

  background:linear-gradient(
    90deg,
    #00ffcc,
    #00a2ff,
    #7b61ff
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 10px rgba(0,255,204,0.7),
    0 0 20px rgba(0,162,255,0.5),
    0 0 30px rgba(123,97,255,0.4);
}

.balance{
  background:#121b2b;
  border:1px solid rgba(255,255,255,0.05);

  padding:12px 18px;
  border-radius:16px;

  font-weight:700;
  font-size:16px;

  color:#00ffcc;
}

/* =========================
   GAME AREA
========================= */

.game-area{
  flex:1;
  position:relative;

  background:
    radial-gradient(circle at top,#122038 0%,#070b14 70%);
}

/* CHART */

canvas{
  width:100%;
  height:100%;
}

/* MULTIPLIER */

.multiplier{
  position:absolute;
  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  font-family:'Orbitron', sans-serif;
  font-size:100px;
  font-weight:900;

  color:#00ffcc;

  text-shadow:
    0 0 10px #00ffcc,
    0 0 25px #00ffcc,
    0 0 50px rgba(0,255,204,0.5);

  z-index:2;
}

/* HISTORY */

.history{
  position:absolute;
  top:18px;
  right:18px;

  display:flex;
  gap:10px;
  flex-wrap:wrap;

  width:320px;
  justify-content:flex-end;
}

.history-item{
  background:#111827;
  border:1px solid rgba(255,255,255,0.06);

  padding:10px 14px;
  border-radius:14px;

  font-weight:700;
  font-size:14px;

  font-family:'Orbitron', sans-serif;
}

/* =========================
   BOTTOM PANEL
========================= */

.bottom-panel{
  height:150px;

  background:#0c121d;

  border-top:1px solid rgba(255,255,255,0.05);

  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;

  padding:20px;
}

.bet-box{
  width:250px;
  background:#111827;

  border:1px solid rgba(255,255,255,0.05);

  border-radius:18px;
  padding:18px;
}

.bet-label{
  margin-bottom:10px;
  color:#9ca3af;
  font-size:14px;
}

.bet-input{
  width:100%;
  height:52px;

  border:none;
  outline:none;

  background:#0b1220;

  border-radius:14px;

  color:white;

  font-size:20px;
  font-weight:700;

  padding:0 14px;

  font-family:'Orbitron', sans-serif;
}

/* BUTTON */

.play-btn{
  height:58px;
  padding:0 50px;

  border:none;
  border-radius:18px;

  cursor:pointer;

  font-size:20px;
  font-weight:800;

  font-family:'Orbitron', sans-serif;

  color:black;

  background:linear-gradient(
    135deg,
    #00ffcc,
    #00c3ff
  );

  box-shadow:
    0 0 15px rgba(0,255,204,0.4),
    0 0 35px rgba(0,195,255,0.2);

  transition:0.2s;
}

.play-btn:hover{
  transform:scale(1.04);
}

.play-btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

  .multiplier{
    font-size:60px;
  }

  .logo{
    font-size:24px;
  }

  .bottom-panel{
    flex-direction:column;
    height:auto;
  }

  .bet-box{
    width:100%;
  }

  .play-btn{
    width:100%;
  }

}

</style>
</head>

<body>

<div class="container">

  <!-- TOPBAR -->

  <div class="topbar">

    <div class="logo">
      BELIEVE CRASH
    </div>

    <div class="balance">
      💰 $1,250.00
    </div>

  </div>

  <!-- GAME AREA -->

  <div class="game-area">

    <div class="history" id="history"></div>

    <div class="multiplier" id="multiplier">
      1.00x
    </div>

    <canvas id="chart"></canvas>

  </div>

  <!-- BOTTOM PANEL -->

  <div class="bottom-panel">

    <div class="bet-box">

      <div class="bet-label">
        Bet Amount
      </div>

      <input
        type="number"
        class="bet-input"
        id="betAmount"
        value="10"
      />

    </div>

    <button class="play-btn" id="playBtn">
      START GAME
    </button>

  </div>

</div>

<script>

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

const multiplierText = document.getElementById("multiplier");
const playBtn = document.getElementById("playBtn");
const historyBox = document.getElementById("history");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize",()=>{

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

});

let multiplier = 1;
let running = false;
let points = [];

/* DRAW GRID */

function drawBackground(){

  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  ctx.lineWidth = 1;

  for(let i=0;i<canvas.width;i+=60){

    ctx.beginPath();
    ctx.moveTo(i,0);
    ctx.lineTo(i,canvas.height);
    ctx.stroke();

  }

  for(let i=0;i<canvas.height;i+=60){

    ctx.beginPath();
    ctx.moveTo(0,i);
    ctx.lineTo(canvas.width,i);
    ctx.stroke();

  }

}

/* DRAW CHART */

function drawChart(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBackground();

  ctx.beginPath();

  ctx.moveTo(0, canvas.height);

  for(let i=0;i<points.length;i++){

    let x = i * 7;

    let y = canvas.height - points[i];

    ctx.lineTo(x,y);

  }

  ctx.strokeStyle = "#00ffcc";
  ctx.lineWidth = 5;

  ctx.shadowBlur = 20;
  ctx.shadowColor = "#00ffcc";

  ctx.stroke();

}

/* HISTORY */

function addHistory(value){

  const item = document.createElement("div");

  item.className = "history-item";

  item.innerText = value.toFixed(2) + "x";

  if(value < 2){

    item.style.color = "#ff5b5b";

  }else{

    item.style.color = "#00ffcc";

  }

  historyBox.prepend(item);

  if(historyBox.children.length > 8){

    historyBox.removeChild(historyBox.lastChild);

  }

}

/* GAME */

function startGame(){

  running = true;

  multiplier = 1;

  points = [];

  playBtn.disabled = true;
  playBtn.innerText = "RUNNING...";

  multiplierText.style.color = "#00ffcc";

  const crashPoint = (Math.random() * 8 + 1).toFixed(2);

  const interval = setInterval(()=>{

    multiplier += 0.02;

    let growth = Math.pow(multiplier,2.3);

    points.push(growth * 7);

    drawChart();

    multiplierText.innerText =
      multiplier.toFixed(2) + "x";

    if(multiplier >= crashPoint){

      clearInterval(interval);

      running = false;

      multiplierText.innerText =
        "CRASHED @" + crashPoint + "x";

      multiplierText.style.color = "#ff4d4d";

      addHistory(parseFloat(crashPoint));

      setTimeout(()=>{

        multiplierText.innerText = "1.00x";

        playBtn.disabled = false;

        playBtn.innerText = "START GAME";

      },2500);

    }

  },50);

}

playBtn.addEventListener("click",()=>{

  if(!running){

    startGame();

  }

});

drawBackground();

</script>

</body>
</html>
